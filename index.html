<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="五金记账">
  <meta name="theme-color" content="#1a73e8">
  <title>五金记账</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ====== iPhone 端：客户列表页 ====== -->
  <div id="page-customers" class="page active">
    <header class="app-header">
      <h1>五金记账</h1>
      <button id="btn-add-customer" class="btn-icon" title="添加客户" aria-label="添加客户">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索客户..." autocomplete="off">
      <button id="btn-voice-search" class="btn-mic" title="语音搜索" aria-label="语音搜索">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>

    <!-- 客户列表 -->
    <div id="customer-list" class="customer-list">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- ====== iPhone 端：客户记录页 ====== -->
  <div id="page-records" class="page">
    <header class="app-header">
      <button id="btn-back" class="btn-icon" title="返回" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1 id="record-customer-name">客户名称</h1>
      <button id="btn-delete-customer" class="btn-icon btn-danger" title="删除客户" aria-label="删除客户">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-2 14H7L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
          <path d="M9 6V4h6v2"></path>
        </svg>
      </button>
    </header>

    <!-- 今日记录列表 -->
    <div id="record-list" class="record-list">
      <div class="loading">加载中...</div>
    </div>

    <!-- 新建记录按钮 -->
    <button id="btn-new-record" class="btn-fab" title="新建记录" aria-label="新建记录">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <!-- ====== PC 端：记录概览页 ====== -->
  <div id="page-overview" class="page">
    <header class="app-header pc-header">
      <h1>五金记账 - 记录管理</h1>
      <div class="header-actions">
        <button id="btn-manage-customers" class="btn-text">管理客户</button>
        <input type="date" id="date-picker" class="date-picker">
      </div>
    </header>

    <div id="overview-content" class="overview-content">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- ====== PC 端：客户管理弹窗 ====== -->
  <div id="modal-manage-customers" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>管理客户</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="add-customer-form">
          <input type="text" id="pc-customer-name" placeholder="输入客户名称">
          <input type="text" id="pc-customer-phone" placeholder="电话（可选）">
          <button id="btn-pc-add-customer" class="btn-primary">添加</button>
        </div>
        <div id="pc-customer-list" class="pc-customer-list"></div>
      </div>
    </div>
  </div>

  <!-- ====== 添加商品弹窗 ====== -->
  <div id="modal-add-item" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>添加商品</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>商品名称</label>
          <div class="input-with-mic">
            <input type="text" id="input-product-name" placeholder="输入或语音输入商品名称" autocomplete="off">
            <button id="btn-voice-product" class="btn-mic" title="语音输入" aria-label="语音输入商品名">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="input-quantity" placeholder="0" min="0" step="0.1" inputmode="decimal">
        </div>
        <button id="btn-confirm-item" class="btn-primary btn-block">确认添加</button>
      </div>
    </div>
  </div>

  <!-- ====== 编辑商品弹窗 ====== -->
  <div id="modal-edit-item" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>编辑商品</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>商品名称</label>
          <input type="text" id="edit-product-name" autocomplete="off">
        </div>
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="edit-quantity" min="0" step="0.1" inputmode="decimal">
        </div>
        <div class="btn-group">
          <button id="btn-save-edit" class="btn-primary">保存</button>
          <button id="btn-delete-item" class="btn-danger">删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 添加客户弹窗 (iPhone) ====== -->
  <div id="modal-add-customer" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>添加客户</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>客户名称</label>
          <div class="input-with-mic">
            <input type="text" id="input-customer-name" placeholder="输入或语音输入客户名称" autocomplete="off">
            <button id="btn-voice-customer" class="btn-mic" title="语音输入" aria-label="语音输入客户名">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>电话（可选）</label>
          <input type="tel" id="input-customer-phone" placeholder="电话号码" inputmode="tel">
        </div>
        <button id="btn-confirm-customer" class="btn-primary btn-block">确认添加</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast 提示 ====== -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase SDK -->
  <!-- Supabase SDK（本地文件，无需 CDN） -->
  <script src="js/supabase.min.js"></script>
  <!-- 应用模块 -->
  <script src="js/supabase.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/record.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
