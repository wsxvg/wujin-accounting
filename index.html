<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="五金记账">
  <meta name="theme-color" content="#1a1a2e">
  <title>五金记账</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== iPhone 端：客户列表页 ====== -->
  <div id="page-customers" class="page active">
    <header class="app-header">
      <div class="header-left">
        <div class="app-logo">记</div>
        <div class="header-title">
          <h1>五金记账</h1>
          <span class="header-subtitle" id="today-date-mobile"></span>
        </div>
      </div>
      <button id="btn-add-customer" class="btn-icon-circle" title="添加客户" aria-label="添加客户">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="搜索客户名称..." autocomplete="off">
      </div>
      <button id="btn-voice-search" class="btn-mic" title="语音搜索" aria-label="语音搜索">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>

    <!-- 客户列表 -->
    <div id="customer-list" class="customer-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>

  <!-- ====== iPhone 端：客户记录页 ====== -->
  <div id="page-records" class="page">
    <header class="app-header">
      <button id="btn-back" class="btn-icon-circle" title="返回" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1 id="record-customer-name" style="flex:1;text-align:center;">客户名称</h1>
      <button id="btn-delete-customer" class="btn-icon-circle btn-icon-danger" title="删除客户" aria-label="删除客户">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-2 14H7L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
          <path d="M9 6V4h6v2"></path>
        </svg>
      </button>
    </header>

    <div id="record-list" class="record-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>加载中...</span>
      </div>
    </div>

    <button id="btn-new-record" class="btn-fab" title="新建记录" aria-label="新建记录">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <!-- ====== PC 端：记录概览页 ====== -->
  <div id="page-overview" class="page">
    <header class="pc-topbar">
      <div class="pc-topbar-left">
        <div class="pc-logo">
          <div class="pc-logo-icon">记</div>
          <div class="pc-logo-text">
            <span class="pc-logo-title">五金记账</span>
            <span class="pc-logo-sub">记录管理系统</span>
          </div>
        </div>
      </div>
      <div class="pc-topbar-right">
        <input type="date" id="date-picker" class="date-picker">
        <button id="btn-manage-customers" class="btn-manage">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          管理客户
        </button>
      </div>
    </header>

    <div id="overview-content" class="overview-content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>

  <!-- ====== PC 端：客户管理弹窗 ====== -->
  <div id="modal-manage-customers" class="modal hidden">
    <div class="modal-content modal-center">
      <div class="modal-header">
        <h2>👥 管理客户</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="add-customer-form">
          <input type="text" id="pc-customer-name" placeholder="客户名称">
          <input type="text" id="pc-customer-phone" placeholder="电话（可选）">
          <button id="btn-pc-add-customer" class="btn-primary">添加</button>
        </div>
        <div id="pc-customer-list" class="pc-customer-list"></div>
      </div>
    </div>
  </div>

  <!-- ====== 添加商品弹窗 ====== -->
  <div id="modal-add-item" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>📦 添加商品</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>商品名称</label>
          <div class="input-with-mic">
            <input type="text" id="input-product-name" placeholder="输入商品名称，或点击麦克风语音输入" autocomplete="off">
            <button id="btn-voice-product" class="btn-mic" title="语音输入" aria-label="语音输入商品名">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="input-quantity" placeholder="0" min="0" step="0.1" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>单位</label>
          <div class="unit-selector" id="input-unit-selector">
            <button class="unit-btn active" data-unit="个">个</button>
            <button class="unit-btn" data-unit="公斤">公斤</button>
            <button class="unit-btn" data-unit="米">米</button>
            <button class="unit-btn" data-unit="箱">箱</button>
          </div>
        </div>
        <button id="btn-confirm-item" class="btn-primary btn-block">✓ 确认添加</button>
      </div>
    </div>
  </div>

  <!-- ====== 编辑商品弹窗 ====== -->
  <div id="modal-edit-item" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>✏️ 编辑商品</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>商品名称</label>
          <input type="text" id="edit-product-name" autocomplete="off">
        </div>
        <div class="form-group">
          <label>数量</label>
          <input type="number" id="edit-quantity" min="0" step="0.1" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>单位</label>
          <div class="unit-selector" id="edit-unit-selector">
            <button class="unit-btn active" data-unit="个">个</button>
            <button class="unit-btn" data-unit="公斤">公斤</button>
            <button class="unit-btn" data-unit="米">米</button>
            <button class="unit-btn" data-unit="箱">箱</button>
          </div>
        </div>
        <div class="btn-group">
          <button id="btn-save-edit" class="btn-primary">保存</button>
          <button id="btn-delete-item" class="btn-outline-danger">删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 添加客户弹窗 (iPhone) ====== -->
  <div id="modal-add-customer" class="modal hidden">
    <div class="modal-content modal-bottom">
      <div class="modal-header">
        <h2>👤 添加客户</h2>
        <button class="btn-close" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>客户名称</label>
          <div class="input-with-mic">
            <input type="text" id="input-customer-name" placeholder="输入客户名称，或语音输入" autocomplete="off">
            <button id="btn-voice-customer" class="btn-mic" title="语音输入" aria-label="语音输入客户名">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>电话（可选）</label>
          <input type="tel" id="input-customer-phone" placeholder="电话号码" inputmode="tel">
        </div>
        <button id="btn-confirm-customer" class="btn-primary btn-block">✓ 确认添加</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast 提示 ====== -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase SDK（本地文件） -->
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/record.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
